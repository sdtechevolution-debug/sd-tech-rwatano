name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm ci

      - name: Test backend
        working-directory: ./backend
        run: |
          npm test -- --runInBand

      - name: Build backend
        working-directory: ./backend
        run: |
          npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Test frontend
        working-directory: ./frontend
        run: |
          npm test

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm run build
